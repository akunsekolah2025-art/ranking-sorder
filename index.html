<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANKING SORDER BY RIZKI ANANDA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #FFDE00;
            --accent: #FF5733;
            --secondary: #00E5FF;
            --text-dark: #000000;
            --white: #ffffff;
            --border-thick: 3px solid #000000;
            --shadow-hard: 8px 8px 0px #000000;
            --shadow-small: 4px 4px 0px #000000;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-body);
            color: var(--text-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 60px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 50px;
            background: var(--white);
            padding: 20px;
            border: var(--border-thick);
            box-shadow: var(--shadow-hard);
            transform: rotate(-1deg);
        }

        h1 { font-size: 2.2rem; font-weight: 800; margin: 0; text-transform: uppercase; }

        .control-panel {
            background: var(--secondary);
            border: var(--border-thick);
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            box-shadow: var(--shadow-hard);
            margin-bottom: 40px;
        }

        .input-group { display: flex; flex-direction: column; gap: 10px; }
        
        button {
            padding: 14px 24px;
            border: var(--border-thick);
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: var(--shadow-small);
            transition: 0.1s;
        }

        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .btn-download { background: var(--white); }
        .btn-proses { background: var(--accent); color: white; }
        .btn-cetak { background: #000; color: white; }

        /* Tabel Styling */
        .table-container {
            background: var(--white);
            border: var(--border-thick);
            box-shadow: var(--shadow-hard);
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f0f0f0; padding: 15px; border-bottom: var(--border-thick); text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #000; font-weight: 600; }

        .rank-circle {
            width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #000; font-weight: 800;
            background: var(--white); box-shadow: 2px 2px 0px #000;
        }

        /* Warna Khusus Ranking 1, 2, 3 */
        .rank-1 .rank-circle { background: var(--gold); }
        .rank-2 .rank-circle { background: var(--silver); }
        .rank-3 .rank-circle { background: var(--bronze); }

        input[type="file"] { padding: 10px; border: var(--border-thick); background: var(--white); width: 100%; }

        /* PRINT SETTINGS */
        @media print {
            @page { size: A4; margin: 10mm; }
            body { background: white; padding: 0; }
            .control-panel, header, .btn-cetak { display: none !important; }
            .table-container { border: none; box-shadow: none; margin: 0; }
            .page-break { page-break-after: always; display: block; height: 0; }
            table { page-break-inside: auto; border: 1px solid #000; margin-bottom: 20px; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            .rank-circle { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>RANKING SORDER BY RIZKI ANANDA</h1>
        <p style="font-weight: 600;"> Platform Manajemen Peringkat Akademik Pintar </p>
    </header>

    <div class="control-panel">
        <div class="input-group">
            <label><b>1. TEMPLATE</b></label>
            <button class="btn-download" onclick="downloadTemplate()">📄 Download Excel</button>
        </div>
        <div class="input-group">
            <label><b>2. UPLOAD</b></label>
            <input type="file" id="inputExcel" accept=".xlsx, .xls">
        </div>
        <div class="input-group">
            <label><b>3. AKSI</b></label>
            <div style="display: flex; gap: 10px;">
                <button class="btn-proses" onclick="prosesData()">Proses</button>
                <button class="btn-cetak" onclick="window.print()">Cetak</button>
            </div>
        </div>
    </div>

    <div id="output-area">
        <!-- Tabel akan di-generate di sini -->
    </div>
</div>

<script>
    function downloadTemplate() {
        const header = [["Nama", "Nilai"]];
        const ws = XLSX.utils.aoa_to_sheet(header);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Template_Ranking.xlsx");
    }

    function prosesData() {
        const fileInput = document.getElementById('inputExcel');
        if (!fileInput.files[0]) return alert("Pilih file!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            let json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            // Urutkan Nilai Terbesar
            json.sort((a, b) => (b.Nilai || 0) - (a.Nilai || 0));

            const outputArea = document.getElementById('output-area');
            outputArea.innerHTML = ""; 

            // Logika Pecah Data: 25 per Halaman
            for (let i = 0; i < json.length; i += 25) {
                const chunk = json.slice(i, i + 25);
                const tableContainer = document.createElement('div');
                tableContainer.className = 'table-container';
                
                // Tambahkan efek page break jika bukan halaman pertama
                if (i > 0) {
                    const pb = document.createElement('div');
                    pb.className = 'page-break';
                    outputArea.appendChild(pb);
                }

                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 80px">Rank</th>
                                <th>Nama Lengkap</th>
                                <th style="text-align: right;">Nilai</th>
                            </tr>
                        </thead>
                        <tbody>`;

                chunk.forEach((item, index) => {
                    const rank = i + index + 1;
                    let rankClass = "";
                    if (rank === 1) rankClass = "rank-1";
                    else if (rank === 2) rankClass = "rank-2";
                    else if (rank === 3) rankClass = "rank-3";

                    tableHTML += `
                        <tr class="${rankClass}">
                            <td><div class="rank-circle">${rank}</div></td>
                            <td>${item.Nama || "-"}</td>
                            <td style="text-align: right; color: var(--accent); font-weight: 800;">${item.Nilai || 0}</td>
                        </tr>`;
                });

                tableHTML += `</tbody></table>`;
                tableContainer.innerHTML = tableHTML;
                outputArea.appendChild(tableContainer);
            }
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }
</script>

</body>
</html>
